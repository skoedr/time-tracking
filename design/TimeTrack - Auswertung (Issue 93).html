/* ─────────────────────────────────────────────────────
   SHARED UI PRIMITIVES
───────────────────────────────────────────────────── */
function GlassCard({ tk, style, children, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: tk.card, backdropFilter: tk.blur, WebkitBackdropFilter: tk.blur,
      border: `1px solid ${tk.border}`, borderRadius: tk.radius,
      boxShadow: tk.shadowSm, ...style
    }}>
      {children}
    </div>
  )
}

function IconBtn({ tk, icon, danger, onClick, title }) {
  const [hover, setHover] = useState(false)
  return (
    <button
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onClick={onClick}
      style={{
        width:30, height:30, display:'grid', placeItems:'center', borderRadius:8,
        border:`1px solid ${hover?(danger?tk.danger:tk.border):tk.borderSub}`,
        background: hover ? (danger?tk.dangerBg:tk.accentBg) : 'transparent',
        color: hover ? (danger?tk.danger:tk.accent) : tk.text3,
        cursor:'pointer', transition:'all .15s', flexShrink:0
      }}
    >
      {icon}
    </button>
  )
}

function PillBtn({ tk, children, active, onClick, small }) {
  const [hover, setHover] = useState(false)
  return (
    <button
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onClick={onClick}
      style={{
        padding: small?'5px 12px':'7px 16px',
        borderRadius:24, border:`1px solid ${active||hover?tk.accent:tk.border}`,
        background: active ? tk.accent : hover ? tk.accentBg : tk.card,
        backdropFilter: tk.blur, WebkitBackdropFilter: tk.blur,
        color: active ? '#fff' : hover ? tk.accent : tk.text2,
        fontSize:12, fontWeight:500, cursor:'pointer', transition:'all .15s',
        display:'inline-flex', alignItems:'center', gap:6, whiteSpace:'nowrap',
        fontFamily: tk.font
      }}
    >
      {children}
    </button>
  )
}

function GlassInput({ tk, value, onChange, placeholder, disabled, type='text' }) {

    <input

        width:'100%', padding:'10px 14px', borderRadius:10,

        border: `1px solid ${tk.border}`, color: tk.text,
        fontSize:13, fontFamily: tk.font, outline:'none',
        opacity: disabled ? .5 : 1
      }}
    />
  )
}

function GlassSelect({ tk, value, onChange, disabled, children }) {

    <select

      style={{
        width:'100%', padding:'10px 14px', borderRadius:10,
        background: tk.inputBg, border: `1px solid ${tk.border}`,
        color: tk.text, fontSize:13, fontFamily: tk.font,

        appearance:'none', WebkitAppearance:'none'
      }}

  )
}

/* ─────────────────────────────────────────────────────
   VIEW: TIMER
───────────────────────────────────────────────────── */
function TimerView({ tk }) {
  const [running, setRunning] = useState(false)
  const [secs, setSecs] = useState(0)
  const [client, setClient] = useState('')
  const [desc, setDesc] = useState('')

  useEffect(() => {
    if (!running) return
    const id = setInterval(() => setSecs(s => s+1), 1000)
    return () => clearInterval(id)
  }, [running])

  function fmt(s) {
    const h = String(Math.floor(s/3600)).padStart(2,'0')
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0')
    const sec = String(s%60).padStart(2,'0')
    return `${h}:${m}:${sec}`
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:32, animation:'fadeIn .2s ease' }}>
      {/* Ambient glow behind clock */}
      <div style={{ position:'relative' }}>
        {running && <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:320, height:120, background: tk.greenBg, borderRadius:'50%', filter:'blur(40px)', pointerEvents:'none' }} />}
        <div style={{ position:'relative', fontSize:78, fontFamily: tk.mono, fontWeight:700, letterSpacing:4, lineHeight:1, fontVariantNumeric:'tabular-nums', color: running ? tk.green : tk.text3, textShadow: running ? `0 0 60px ${tk.green}40` : 'none', transition:'color .4s, text-shadow .4s' }}>
          {fmt(secs)}
        </div>
        {running && (
          <div style={{ textAlign:'center', marginTop:10, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>

  )
}

function KalenderView({ tk }) {
  const DAYS = ['Mo','Di','Mi','Do','Fr','Sa','So']
  // April 2026: starts Wednesday (offset 2)
  const offset = 2
  const weeks = useMemo(() => {
    const all = []
    for(let i=0;i<35;i++){
      const d = i-offset+1
      const inMonth = d>=1 && d<=30
      const key = `2026-04-${String(d).padStart(2,'0')}`
      all.push({ d, inMonth, isToday: d===27, bars: inMonth?(CAL_BARS[key]||[]):[] })
    }
    const w=[]
    for(let r=0;r<5;r++) w.push(all.slice(r*7,(r+1)*7))
    return w
  }, [])

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14, animation:'fadeIn .2s ease' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ display:'flex', gap:2 }}>
          <button style={{ width:32, height:32, borderRadius:8, border:`1px solid ${tk.border}`, background: tk.card, backdropFilter: tk.blur, color: tk.text2, display:'grid', placeItems:'center', cursor:'pointer' }}><Icon.ChevLeft/></button>
          <button style={{ width:32, height:32, borderRadius:8, border:`1px solid ${tk.border}`, background: tk.card, backdropFilter: tk.blur, color: tk.text2, display:'grid', placeItems:'center', cursor:'pointer' }}><Icon.ChevRight/></button>
        </div>
        <span style={{ fontSize:16, fontWeight:700, color: tk.text, minWidth:140 }}>April 2026</span>
        <button style={{ fontSize:11, fontWeight:500, color: tk.text3, background:'transparent', border:`1px solid ${tk.border}`, padding:'4px 12px', borderRadius:24, cursor:'pointer', fontFamily: tk.font }}>Heute</button>
        <div style={{ marginLeft:'auto', display:'flex', gap:6, flexWrap:'wrap' }}>
          <PillBtn tk={tk} active small>
            <Icon.File size={12}/> Letzter Monat
          </PillBtn>
          {['Diese Woche','Letzte Woche','Dieser Monat'].map(l=>(
            <PillBtn key={l} tk={tk} small>{l}</PillBtn>
          ))}
        </div>
      </div>

      {/* Grid */}
      <GlassCard tk={tk} style={{ overflow:'hidden', padding:0 }}>
        {/* Day headers */}
        <div style={{ display:'grid', gridTemplateColumns:'36px repeat(7,1fr)', borderBottom:`1px solid ${tk.border}` }}>
          <div style={{ padding:'8px 4px', fontSize:10, color: tk.text3, textAlign:'center' }}>KW</div>
          {DAYS.map(d=><div key={d} style={{ padding:'8px', fontSize:11, fontWeight:600, color: tk.text3, textAlign:'center', letterSpacing:.5 }}>{d}</div>)}
        </div>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{ display:'grid', gridTemplateColumns:'36px repeat(7,1fr)', borderTop: wi>0?`1px solid ${tk.borderSub}`:'none' }}>
            <div style={{ fontSize:10, color: tk.text3, textAlign:'center', padding:'8px 2px', borderRight:`1px solid ${tk.borderSub}`, display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:8 }}>{17+wi}</div>
            {week.map((day,di)=>(
              <div key={di} style={{
                height:68, padding:'7px 10px', borderLeft: di>0?`1px solid ${tk.borderSub}`:'none',
                background: day.isToday ? tk.accentBg : 'transparent',
                opacity: day.inMonth?1:0.2, display:'flex', flexDirection:'column',
                cursor:'pointer', transition:'background .15s',
                outline: day.isToday ? `1.5px solid ${tk.accent}` : 'none',
                outlineOffset:'-1.5px',
              }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                  <span style={{ fontSize:13, fontWeight: day.isToday?700:400, color: day.isToday?tk.accent:tk.text }}>{day.d>0&&day.d<=30?day.d:''}</span>
                  {day.bars.length>0 && <span style={{ fontSize:9, fontFamily: tk.mono, color: tk.text3, fontVariantNumeric:'tabular-nums' }}>3:45</span>}
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:2.5, marginTop:'auto' }}>
                  {day.bars.slice(0,4).map((cid,i)=>(
                    <div key={i} style={{ height:3, borderRadius:2, background: cl(cid).color, boxShadow:`0 0 4px ${cl(cid).color}60` }} />
                  ))}
                  {day.bars.length>4 && <span style={{ fontSize:9, color: tk.text3 }}>+{day.bars.length-4}</span>}
                </div>
              </div>
            ))}
          </div>
        ))}
      </GlassCard>
    </div>
  )
}

const CLIENT_COLORS = ['#8b7cf8','#a78bf5','#ec4899','#fbbf24','#4ade80','#60a5fa','#f87171','#fb923c','#2dd4bf','#a3e635']

function KundenView({ tk }) {
  const [clients, setClients] = useState(CLIENTS)
  const [showForm, setShowForm] = useState(false)
  const [editing, setEditing] = useState(null)
  const [archExpanded, setArchExpanded] = useState(false)

  const active = clients.filter(c=>c.active)
  const archived = clients.filter(c=>!c.active)

  function toggleActive(c) { setClients(cs => cs.map(x => x.id===c.id?{...x,active:!x.active}:x)) }
  function openEdit(c) { setEditing(c); setShowForm(true) }
  function openNew() { setEditing(null); setShowForm(true) }

  return (
    <div style={{ maxWidth:600, margin:'0 auto', animation:'fadeIn .2s ease' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <h1 style={{ fontSize:20, fontWeight:700, color: tk.text }}>Kunden</h1>
        <PillBtn tk={tk} onClick={openNew} active>
          <Icon.Plus size={13}/> Neuer Kunde
        </PillBtn>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {active.map(c=>(
          <GlassCard key={c.id} tk={tk} style={{ padding:'14px 18px', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:14, height:14, borderRadius:'50%', background: c.color, flexShrink:0, boxShadow:`0 0 8px ${c.color}80` }} />
            <span style={{ flex:1, fontWeight:600, color: tk.text, fontSize:14 }}>{c.name}</span>
            <span style={{ fontSize:12, color: tk.text3, fontFamily: tk.mono }}>85,00 €/h</span>
            <IconBtn tk={tk} icon={<Icon.Archive/>} title="Archivieren" onClick={()=>toggleActive(c)} />
            <IconBtn tk={tk} icon={<Icon.Edit/>} title="Bearbeiten" onClick={()=>openEdit(c)} />
            <IconBtn tk={tk} icon={<Icon.Trash/>} danger title="Löschen" />
          </GlassCard>
        ))}
      </div>

      {archived.length > 0 && (
        <div style={{ marginTop:20 }}>
          <button onClick={()=>setArchExpanded(v=>!v)} style={{ display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color: tk.text3, fontSize:11, fontWeight:600, letterSpacing:.5, cursor:'pointer', marginBottom:8, fontFamily: tk.font }}>
            <span style={{ display:'inline-block', transform: archExpanded?'rotate(90deg)':'rotate(0deg)', transition:'transform .2s' }}><Icon.ChevRight size={12}/></span>
            ARCHIVIERT ({archived.length})
          </button>
          {archExpanded && (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {archived.map(c=>(
                <GlassCard key={c.id} tk={tk} style={{ padding:'12px 18px', display:'flex', alignItems:'center', gap:12, opacity:.55 }}>
                  <div style={{ width:14, height:14, borderRadius:'50%', background: c.color, flexShrink:0 }} />
                  <span style={{ flex:1, fontWeight:500, color: tk.text }}>{c.name}</span>
                  <IconBtn tk={tk} icon={<Icon.Unarchive/>} title="Reaktivieren" onClick={()=>toggleActive(c)} />
                  <IconBtn tk={tk} icon={<Icon.Trash/>} danger title="Löschen" />
                </GlassCard>
              ))}
            </div>
          )}
        </div>
      )}

      {showForm && (
        <ClientModal tk={tk} client={editing} onClose={()=>setShowForm(false)}
          onSave={(data)=>{ setClients(cs=>editing?cs.map(x=>x.id===editing.id?{...x,...data}:x):[...cs,{id:Date.now(),...data,active:true}]); setShowForm(false) }} />
      )}
    </div>
  )
}

        border:`1px solid ${value?tk.accent:tk.border}`, cursor:'pointer', position:'relative',

  function Section({ title, children }) {

  return (
    <div style={{ maxWidth:580, margin:'0 auto', display:'flex', flexDirection:'column', gap:20, animation:'fadeIn .2s ease' }}>

                padding:'5px 12px', borderRadius:8, border:`1px solid ${round===v?tk.accent:tk.border}`,

        <Row label="Methode" right={
          <div style={{ display:'flex', gap:4 }}>

              <button key={v} onClick={()=>setMode(v)} style={{
                padding:'5px 12px', borderRadius:8, border:`1px solid ${mode===v?tk.accent:tk.border}`,
                background: mode===v?tk.accentBg:tk.card, color: mode===v?tk.accent:tk.text2,
                fontSize:12, fontWeight:600, cursor:'pointer', fontFamily: tk.font
              }}>{l}</button>
            ))}
          </div>
        }/>
      </Section>

      <Section title="App-Verhalten">
        <Row label="Mit Windows starten" sub="TimeTrack beim Systemstart öffnen" right={<Toggle value={autostart} onChange={setAutostart}/>}/>

        <Row label="USt-IdNr." right={<div style={{ fontSize:12, color: tk.text2, fontFamily: tk.mono, background: tk.inputBg, padding:'6px 12px', borderRadius:8, border:`1px solid ${tk.border}` }}>DE 123 456 789</div>}/>
        <Row label="Logo" right={
          <button style={{ padding:'6px 14px', borderRadius:8, border:`1px solid ${tk.border}`, background: tk.card, color: tk.text2, fontSize:12, cursor:'pointer', fontFamily: tk.font }}>
            Datei auswählen…
          </button>
        }/>
      </Section>

      <Section title="Backup">
        <Row label="Auto-Backup" sub="Täglich in gewählten Ordner" right={<Toggle value={true} onChange={()=>{}}/>}/>
        <Row label="Zielordner" right={

      </Section>
    </div>
  )

/* ----- Trend Chart (Wochen / Monate) ----- */
function TrendChart({ tk, mode, data, target }) {
  // mode: 'week' (stacked b/n) | 'month' (h bars + revenue line)
  const W = 720, H = 220, P = { l: 36, r: 44, t: 16, b: 28 }
  const innerW = W - P.l - P.r, innerH = H - P.t - P.b
  const max = mode==='week'
    ? Math.max(...data.map(d => d.b + d.n), target || 0) * 1.05
    : Math.max(...data.map(d => d.h)) * 1.1
  const maxR = mode==='month' ? Math.max(...data.map(d => d.r)) * 1.1 : 0
  const bw = innerW / data.length * 0.62
  const step = innerW / data.length

  // Y-ticks
  const ticks = 4
  const tickVals = Array.from({length:ticks+1}, (_,i)=> max * i/ticks)

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'auto', display:'block' }}>
      <defs>
        <linearGradient id="barGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={tk.accent} stopOpacity=".95"/>
          <stop offset="100%" stopColor={tk.accent} stopOpacity=".55"/>
        </linearGradient>
        <linearGradient id="barGradN" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={tk.text3} stopOpacity=".55"/>
          <stop offset="100%" stopColor={tk.text3} stopOpacity=".25"/>
        </linearGradient>
      </defs>

      {/* Grid + Y axis labels */}
      {tickVals.map((t,i) => {
        const y = P.t + innerH - (t/max)*innerH
        return (
          <g key={i}>
            <line x1={P.l} x2={P.l+innerW} y1={y} y2={y} stroke={tk.border} strokeWidth=".8" strokeDasharray={i===0?'none':'2 4'}/>
            <text x={P.l-8} y={y+4} fontSize="9.5" fontFamily={tk.mono} fill={tk.text3} textAnchor="end">{Math.round(t)}h</text>
          </g>
        )
      })}

      {/* Right axis (revenue) for month mode */}
      {mode==='month' && tickVals.map((_,i) => {
        const t = maxR * i / ticks
        const y = P.t + innerH - (t/maxR)*innerH
        return (
          <text key={i} x={P.l+innerW+8} y={y+4} fontSize="9.5" fontFamily={tk.mono} fill={tk.green} textAnchor="start">{Math.round(t/1000)}k</text>
        )
      })}

      {/* Target line for week mode */}
      {mode==='week' && target && (
        <g>
          <line
            x1={P.l} x2={P.l+innerW}
            y1={P.t + innerH - (target/max)*innerH} y2={P.t + innerH - (target/max)*innerH}
            stroke={tk.accent} strokeWidth="1.2" strokeDasharray="3 3" opacity=".7"
          />
          <text
            x={P.l+innerW-4} y={P.t + innerH - (target/max)*innerH - 4}
            fontSize="9.5" fontFamily={tk.mono} fill={tk.accent} textAnchor="end" opacity=".9"
          >Ziel {target}h</text>
        </g>
      )}

      {/* Bars */}
      {data.map((d,i) => {
        const x = P.l + step*i + (step-bw)/2
        if (mode==='week') {
          const totalH = ((d.b + d.n) / max) * innerH
          const billH  = (d.b / max) * innerH
          const nbillH = (d.n / max) * innerH
          const yTotal = P.t + innerH - totalH
          return (
            <g key={i}>
              <rect x={x} y={yTotal+billH} width={bw} height={nbillH} fill="url(#barGradN)" rx="2"/>
              <rect x={x} y={yTotal} width={bw} height={billH} fill="url(#barGrad)" rx="2"/>
              <text x={x+bw/2} y={H-10} fontSize="9.5" fontFamily={tk.mono} fill={tk.text3} textAnchor="middle">{d.lbl.replace('KW','')}</text>
              {/* total on top */}
              <text x={x+bw/2} y={yTotal-5} fontSize="9" fontFamily={tk.mono} fill={tk.text2} textAnchor="middle" fontWeight="600">{d.b+d.n}</text>
            </g>
          )
        } else {
          const h = (d.h / max) * innerH
          const y = P.t + innerH - h
          return (
            <g key={i}>
              <rect x={x} y={y} width={bw} height={h} fill="url(#barGrad)" rx="2"/>
              <text x={x+bw/2} y={H-10} fontSize="9.5" fontFamily={tk.font} fill={tk.text3} textAnchor="middle">{d.lbl}</text>
            </g>
          )
        }
      })}

      {/* Revenue overlay line (month mode) */}
      {mode==='month' && (
        <g>
          <path
            d={data.map((d,i) => {
              const cx = P.l + step*i + step/2
              const cy = P.t + innerH - (d.r/maxR)*innerH
              return `${i===0?'M':'L'} ${cx} ${cy}`
            }).join(' ')}
            fill="none" stroke={tk.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{ filter:`drop-shadow(0 0 4px ${tk.green})` }}
          />
          {data.map((d,i) => {
            const cx = P.l + step*i + step/2
            const cy = P.t + innerH - (d.r/maxR)*innerH
            return <circle key={i} cx={cx} cy={cy} r="2.6" fill={tk.green}/>
          })}
        </g>
      )}
    </svg>
  )
}

/* ----- Horizontaler Balken pro Kunde ----- */
function ClientBars({ tk, items, totalKey='h' }) {
  const total = items.reduce((s,x) => s + x[totalKey], 0)
  const max = Math.max(...items.map(x => x[totalKey]))
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
      {items.map((it,i) => {
        const pct = (it[totalKey] / max) * 100
        const sharePct = (it[totalKey] / total) * 100
        return (
          <div key={i} style={{ display:'flex', flexDirection:'column', gap:4 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12 }}>
              <span style={{ width:9, height:9, borderRadius:'50%', background: it.color, flexShrink:0, opacity: it.rest?0.5:1 }}/>
              <span style={{ flex:1, color: tk.text, fontWeight: it.rest?400:500, fontStyle: it.rest?'italic':'normal' }}>{it.name}</span>
              <span style={{ fontFamily: tk.mono, fontSize:11.5, color: tk.text2, fontVariantNumeric:'tabular-nums' }}>{fmtH(it[totalKey])}</span>
              <span style={{ fontFamily: tk.mono, fontSize:11, color: tk.text3, fontVariantNumeric:'tabular-nums', minWidth:40, textAlign:'right' }}>{sharePct.toFixed(0)}%</span>
            </div>
            <div style={{ height:5, borderRadius:3, background: tk.borderSub, overflow:'hidden' }}>
              <div style={{
                height:'100%', width: pct+'%', borderRadius:3,
                background: it.rest ? tk.text3 : `linear-gradient(90deg, ${it.color}, ${it.color}cc)`,
                boxShadow: it.rest?'none':`0 0 6px ${it.color}55`,
                transition:'width .4s ease'
              }}/>
            </div>
          </div>
        )
      })}
    </div>
  )
}

/* ----- Wochentag Bars (vertikal) ----- */
function WeekdayBars({ tk, data }) {
  const max = Math.max(...data.map(d => d.h))
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8, alignItems:'end', height:170 }}>
      {data.map((d,i) => {
        const h = (d.h / max) * 130
        const isWeekend = d.d==='Sa' || d.d==='So'
        const col = isWeekend ? tk.text3 : tk.accent
        return (

            <div style={{
              width:'100%', height:Math.max(h, 2), borderRadius:'4px 4px 1px 1px',

          <Icon.Dot color={tk.green} pulse />
          <span style={{ fontSize:11, fontWeight:600, color: tk.green }}>{cl(RUNNING.client_id).name}</span>
          <span style={{ fontFamily: tk.mono, fontSize:12, color: tk.green, fontVariantNumeric:'tabular-nums', letterSpacing:.5 }}>01:23:47</span>
        </div>

        {/* Dark/Light toggle */}
        <button onClick={()=>setDark(!dark)} style={{
          width:34, height:34, borderRadius:10, border:`1px solid ${tk.border}`,
          background: tk.card, backdropFilter: tk.blur, color: tk.text2,
          display:'grid', placeItems:'center', cursor:'pointer', transition:'all .15s'
        }}>
          {dark ? <Icon.Sun size={15}/> : <Icon.Moon size={15}/>}
        </button>
      </div>
    </nav>
  )
}

/* ─────────────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "emptyState": false,
  "threePanel": true,
  "pace": true
}/*EDITMODE-END*/

function App() {
  const [dark, setDark] = useState(TWEAK_DEFAULTS.dark)
  const [view, setView] = useState('auswertung')
  const [emptyState, setEmptyState] = useState(TWEAK_DEFAULTS.emptyState)
  const [threePanel, setThreePanel] = useState(TWEAK_DEFAULTS.threePanel)
  const [pace, setPace] = useState(TWEAK_DEFAULTS.pace)
  const tk = useMemo(() => makeTokens(dark), [dark])

  function persist(key, value) {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]: value } }, '*')
  }

  // Tweaks protocol
  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true)
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false)
    }
    window.addEventListener('message', onMsg)
    window.parent.postMessage({ type: '__edit_mode_available' }, '*')
    return () => window.removeEventListener('message', onMsg)
  }, [])
  const [showTweaks, setShowTweaks] = useState(false)

  function handleSetDark(v) { setDark(v); persist('dark', v) }
  function handleSetEmpty(v) { setEmptyState(v); persist('emptyState', v) }
  function handleSetThree(v) { setThreePanel(v); persist('threePanel', v) }
  function handleSetPace(v)  { setPace(v); persist('pace', v) }

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', background: tk.pageBg, fontFamily: tk.font, color: tk.text }}>
      {/* Global ambient blobs */}
      <div style={{ position:'fixed', top:-100, right:'20%', width:400, height:400, borderRadius:'50%', background: tk.accentBg, filter:'blur(80px)', pointerEvents:'none', zIndex:0 }} />
      <div style={{ position:'fixed', bottom:-50, left:'10%', width:300, height:300, borderRadius:'50%', background: tk.greenBg, filter:'blur(80px)', pointerEvents:'none', zIndex:0 }} />

      <div style={{ position:'relative', zIndex:1, width:'100%', height:'100%', display:'flex', flexDirection:'column' }}>
        <NavBar tk={tk} view={view} setView={setView} dark={dark} setDark={handleSetDark} />
        <main style={{ flex:1, overflowY:'auto', padding:'22px 28px' }}>
          {view==='heute'         && <HeuteView tk={tk}/>}
          {view==='timer'         && <TimerView tk={tk}/>}
          {view==='kalender'      && <KalenderView tk={tk}/>}
          {view==='kunden'        && <KundenView tk={tk}/>}
          {view==='auswertung'    && <AuswertungView tk={tk} opts={{ empty: emptyState, threePanel, pace }}/>}
          {view==='einstellungen' && <EinstellungenView tk={tk}/>}
        </main>
      </div>

      {/* Tweaks */}
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, zIndex:10000, background: dark?'rgba(12,14,30,.97)':'rgba(255,255,255,.97)', backdropFilter:'blur(16px)', border:`1px solid ${tk.border}`, borderRadius:16, padding:22, minWidth:220, color: tk.text, fontFamily: tk.font, boxShadow: tk.shadow }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <span style={{ fontWeight:700, fontSize:14 }}>Tweaks</span>
            <button onClick={()=>{ setShowTweaks(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*') }} style={{ background:'none', border:'none', color: tk.text3, fontSize:18, cursor:'pointer', lineHeight:1 }}>×</button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:.8, color: tk.text3, textTransform:'uppercase', marginBottom:8 }}>Farbmodus</div>
              <div style={{ display:'flex', gap:6 }}>
                {[[true,'Dark'],[false,'Light']].map(([v,l])=>(
                  <button key={l} onClick={()=>handleSetDark(v)} style={{
                    flex:1, padding:'8px', borderRadius:8, border:`1px solid ${dark===v?tk.accent:tk.border}`,
                    background: dark===v?tk.accentBg:'transparent', color: dark===v?tk.accent:tk.text2,
                    fontSize:12, fontWeight:600, cursor:'pointer', fontFamily: tk.font
                  }}>{l}</button>
                ))}
              </div>
            </div>
            {view==='auswertung' && (
              <div>
                <div style={{ fontSize:11, fontWeight:600, letterSpacing:.8, color: tk.text3, textTransform:'uppercase', marginBottom:8 }}>Auswertung — Optionen</div>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {[
                    ['emptyState', emptyState, handleSetEmpty, 'Leer-State zeigen'],
                    ['threePanel', threePanel, handleSetThree, '3. Panel: nach Tag'],
                    ['pace', pace, handleSetPace, 'Pace-Tracker einblenden'],
                  ].map(([k, val, on, label]) => (
                    <label key={k} style={{ display:'flex', alignItems:'center', gap:8, fontSize:12, color: tk.text2, cursor:'pointer' }}>
                      <span onClick={()=>on(!val)} style={{
                        width:32, height:18, borderRadius:9, background: val ? tk.accent : tk.card,
                        border:`1px solid ${val?tk.accent:tk.border}`, position:'relative', transition:'all .2s'
                      }}>
                        <span style={{ position:'absolute', top:1, left: val?15:1, width:14, height:14, borderRadius:'50%', background:'#fff', transition:'left .2s', boxShadow:'0 1px 3px rgba(0,0,0,.3)' }}/>
                      </span>
                      <span onClick={()=>on(!val)}>{label}</span>
                    </label>
                  ))}
                </div>
              </div>
            )}
            <div>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:.8, color: tk.text3, textTransform:'uppercase', marginBottom:8 }}>View</div>
              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                {NAV_ITEMS.map(item=>(
                  <button key={item.id} onClick={()=>setView(item.id)} style={{
                    padding:'7px 12px', borderRadius:8, border:`1px solid ${view===item.id?tk.accent:tk.border}`,
                    background: view===item.id?tk.accentBg:'transparent',
                    color: view===item.id?tk.accent:tk.text2,
                    fontSize:12, fontWeight:500, cursor:'pointer', textAlign:'left', fontFamily: tk.font
                  }}>{item.label}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Rebuild native modules for Node (test runtime)
        run: pnpm rebuild better-sqlite3

      - name: Test
        run: pnpm test

      - name: Rebuild better-sqlite3 for Electron ABI
        run: pnpm exec electron-rebuild -f -w better-sqlite3

      - name: Build installer (NSIS)
        run: |
          pnpm run build
          pnpm exec electron-builder --win --publish never

      - name: Smoke test packaged binary (DB + migrations against Electron ABI)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist/win-unpacked" -Filter "*.exe" |
                 Where-Object { $_.Name -notmatch '(uninstall|crashpad|elevate)' } |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Error "No packaged exe found in dist/win-unpacked"
            exit 1
          }
          $out = Join-Path $env:RUNNER_TEMP "smoke.json"
          if (Test-Path $out) { Remove-Item $out -Force }
          Write-Host "Running smoke test: $($exe.FullName) --smoke-test=$out"
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--smoke-test=$out" -PassThru -NoNewWindow
          if (-not $proc.WaitForExit(60000)) {
            Stop-Process -Id $proc.Id -Force
            Write-Error "Smoke test timed out after 60s"
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "Smoke test exited with code $($proc.ExitCode)"
            if (Test-Path $out) { Get-Content $out }
            exit 1
          }
          if (-not (Test-Path $out)) {
            Write-Error "Smoke test did not produce $out"
            exit 1
          }
          $payload = Get-Content $out -Raw | ConvertFrom-Json
          Write-Host "Smoke result: $($payload | ConvertTo-Json -Compress)"
          if (-not $payload.ok) {
            Write-Error "Smoke test reported ok=false: $($payload.error)"
            exit 1
          }
          if ($payload.schemaVersion -lt 3) {
            Write-Error "Expected schemaVersion >= 3 (v1.2 migrations), got $($payload.schemaVersion)"
            exit 1
          }
          if (-not $payload.pdfBytes -or $payload.pdfBytes -lt 1000) {
            Write-Error "Expected pdfBytes >= 1000 (v1.3 PDF pipeline), got $($payload.pdfBytes)"
            exit 1
          }
          Write-Host "Smoke test passed (schema v$($payload.schemaVersion), Electron $($payload.electronVersion), PDF $($payload.pdfBytes) bytes)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: timetrack-windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Rebuild native modules for Node (test runtime)
        run: pnpm rebuild better-sqlite3

      - name: Test
        run: pnpm test

      - name: Rebuild better-sqlite3 for Electron ABI
        run: pnpm exec electron-rebuild -f -w better-sqlite3

      - name: Build app (DMG + ZIP, arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          pnpm run build
          pnpm exec electron-builder --mac --publish never

      - name: Smoke test packaged binary (DB + migrations against Electron ABI)
        run: |
          APP_BINARY="dist/mac-arm64/TimeTrack.app/Contents/MacOS/TimeTrack"
          if [ ! -f "$APP_BINARY" ]; then
            echo "ERROR: Binary not found at $APP_BINARY"
            ls -la dist/ || true
            exit 1
          fi
          OUT="$RUNNER_TEMP/smoke.json"
          echo "Running smoke test: $APP_BINARY --smoke-test=$OUT"
          "$APP_BINARY" "--smoke-test=$OUT" &
          SMOKE_PID=$!
          WAITED=0
          while kill -0 $SMOKE_PID 2>/dev/null && [ $WAITED -lt 60 ]; do
            sleep 1
            WAITED=$((WAITED + 1))
          done
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill -9 $SMOKE_PID 2>/dev/null
            echo "ERROR: Smoke test timed out after 60s"
            exit 1
          fi
          wait $SMOKE_PID
          SMOKE_EXIT=$?
          if [ $SMOKE_EXIT -ne 0 ]; then
            echo "ERROR: Smoke test exited with code $SMOKE_EXIT"
            cat "$OUT" 2>/dev/null || true
            exit 1
          fi
          if [ ! -f "$OUT" ]; then
            echo "ERROR: Smoke test did not produce $OUT"
            exit 1
          fi
          python3 -c "
          import json, sys
          d = json.load(open('$OUT'))
          print('Smoke result:', json.dumps(d))
          if not d.get('ok'):
              print('ERROR: ok=false:', d.get('error'))
              sys.exit(1)
          if d.get('schemaVersion', 0) < 3:
              print('ERROR: schemaVersion', d.get('schemaVersion'))
              sys.exit(1)
          if d.get('pdfBytes', 0) < 1000:
              print('ERROR: pdfBytes', d.get('pdfBytes'))
              sys.exit(1)
          print('Smoke test passed (schema v{}, Electron {}, PDF {} bytes)'.format(
              d['schemaVersion'], d.get('electronVersion', '?'), d['pdfBytes']))
          "

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: timetrack-macos
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: timetrack-windows-installer
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: timetrack-macos
          path: dist

      - name: Resolve tag
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "TimeTrack $TAG" \
              --generate-notes \
              dist/*
          fi
